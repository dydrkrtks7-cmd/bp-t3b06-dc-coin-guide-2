<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b91c1c"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fca5a5"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="1039" cy="322" r="38" fill="#991b1b" opacity="0.10"/>
    <circle cx="262" cy="540" r="77" fill="#991b1b" opacity="0.06"/>
    <circle cx="303" cy="49" r="35" fill="#991b1b" opacity="0.08"/>
    <circle cx="222" cy="493" r="36" fill="#991b1b" opacity="0.08"/>
    <circle cx="186" cy="239" r="55" fill="#991b1b" opacity="0.06"/>
    <circle cx="935" cy="388" r="74" fill="#991b1b" opacity="0.09"/>
    <rect x="1121" y="-44" width="58" height="91" rx="8" fill="#b91c1c" opacity="0.10" transform="rotate(41, 1070, 639)"/>
    <rect x="-70" y="488" width="97" height="28" rx="8" fill="#b91c1c" opacity="0.09" transform="rotate(19, 484, 246)"/>
    <rect x="402" y="471" width="23" height="30" rx="8" fill="#b91c1c" opacity="0.10" transform="rotate(4, 637, 501)"/>
    <rect x="1126" y="250" width="63" height="37" rx="8" fill="#b91c1c" opacity="0.07" transform="rotate(26, 1177, 111)"/>
    <rect x="694" y="1" width="99" height="70" rx="8" fill="#b91c1c" opacity="0.04" transform="rotate(36, 983, 177)"/>
    <rect x="539" y="696" width="43" height="43" rx="8" fill="#b91c1c" opacity="0.09" transform="rotate(8, 13, 234)"/>
    <rect x="196" y="451" width="52" height="23" rx="8" fill="#b91c1c" opacity="0.06" transform="rotate(7, 169, 522)"/>
    <rect x="866" y="413" width="89" height="81" rx="8" fill="#b91c1c" opacity="0.04" transform="rotate(18, 891, 392)"/>
    <polygon points="179,432 243,560 115,560" fill="#991b1b" opacity="0.09"/>
    <polygon points="53,66 95,150 11,150" fill="#991b1b" opacity="0.12"/>
    <polygon points="1181,322 1203,366 1159,366" fill="#991b1b" opacity="0.06"/>
    <polygon points="971,275 1032,397 910,397" fill="#991b1b" opacity="0.11"/>

  <!-- Wave at bottom -->
  <path d="M0,560 C360,595 840,525 1200,560 L1200,630 L0,630Z" fill="#991b1b" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    등촌 코인노래방 가이드
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    등촌 — 코인노래방
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#fca5a5" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#fca5a5" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    등촌 등촌 코인노래방 가이드 — 코인노래방
  </text>
</svg>